name: Selenium Tests

on:
  push:
    branches: [ "main" ]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Java
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '21'

    - name: Run Tests
      run: mvn clean test

    - name: Upload Test Reports
      uses: actions/upload-artifact@v4
      with:
        name: Selenium-Reports
        path: |
          reports/
          screenshots/
          test-output/